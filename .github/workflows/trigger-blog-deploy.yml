name: Trigger blog deploy

on:
  push:
    branches: [main]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger blog repository deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.BLOG_DEPLOY_TOKEN }}
          repository: common-member/common-member.github.io
          event-type: til-updated
